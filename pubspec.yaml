name: glassboard_app
description: Glassboard — Cross-Module Handoff Tracker
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.1.0
  firebase_storage: ^12.1.0
  firebase_database: ^11.1.0
  firebase_messaging: ^15.0.0
  google_sign_in: ^6.2.1

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.1.3

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  fl_chart: ^0.68.0
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5

  # File handling
  file_picker: ^8.0.3
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  open_file: ^3.3.2
  url_launcher: ^6.3.0
  share_plus: ^10.1.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.0
  timeago: ^3.6.1
  shared_preferences: ^2.3.1
  connectivity_plus: ^6.0.3
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
